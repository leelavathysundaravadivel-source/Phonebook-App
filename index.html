<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonebook Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light py-5">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
                <div class="card shadow border-0 rounded-4">

                    <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
                        <h2 class="fw-bold mb-0"><i class="bi bi-person-lines-fill me-2"></i>Digital Phonebook</h2>
                    </div>

                    <div class="card-body p-4 p-sm-5">

                        <div id="statusAlert" class="alert alert-info alert-dismissible fade show d-none" role="alert">
                            <span id="alertText"></span>
                            <button type="button" class="btn-close" onclick="closeAlert()"></button>
                        </div>

                        <div class="row g-4">
                            <div class="col-12 col-md-5">
                                <div class="p-3 bg-white border rounded-3 shadow-sm">
                                    <h4 id="formTitle" class="fw-bold mb-3 text-dark">Add New Contact</h4>
                                    <form id="contactForm" novalidate>
                                        <div class="mb-3">
                                            <label for="contactName" class="form-label small fw-bold text-secondary">Full Name</label>
                                            <input type="text" id="contactName" class="form-control" placeholder="John Doe">
                                        </div>
                                        <div class="mb-3">
                                            <label for="contactPhone" class="form-label small fw-bold text-secondary">Phone Number</label>
                                            <input type="tel" id="contactPhone" class="form-control" placeholder="10-digit mobile number">
                                        </div>
                                        <div class="mb-3">
                                            <label for="contactEmail" class="form-label small fw-bold text-secondary">Email Address</label>
                                            <input type="email" id="contactEmail" class="form-control" placeholder="name@email.com">
                                        </div>
                                        <div class="d-flex gap-2">
                                            <button type="submit" id="submitBtn" class="btn btn-primary w-100 fw-bold">
                                            <i class="bi bi-plus-circle me-1"></i>Save Contact
                                        </button>
                                            <button type="button" id="cancelEditBtn" class="btn btn-outline-secondary d-none" onclick="exitEditingMode()">
                                            Cancel
                                        </button>
                                        </div>
                                    </form>
                                </div>
                            </div>

                            <div class="col-12 col-md-7">
                                <div class="input-group mb-3 shadow-sm">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
                                    <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Search contacts by name..." oninput="handleSearch()">
                                </div>

                                <div id="loadingSpinner" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Fetching backend context...</span>
                                    </div>
                                    <p class="text-muted small mt-2">Loading contact server stream...</p>
                                </div>

                                <div id="directoryContainer" class="d-none">
                                    <ul id="contactList" class="list-group gap-2"></ul>

                                    <div id="emptyView" class="text-center py-5 text-muted d-none">
                                        <i class="bi bi-person-x display-4 d-block mb-2"></i>
                                        <p class="mb-0 fw-semibold">No contacts found matching criteria.</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="card-footer bg-white py-3 border-top text-center rounded-bottom-4 text-muted small">
                        Data synced in real-time with public REST endpoint streams using JSON formats.
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
